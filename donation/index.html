<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJA Plus 分析器</title>
    <link rel="icon" href="../img/logo.svg">
    <link rel="shortcut icon" href="../img/logo.svg" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/donation.css">


</head>

<body>
    <header>
        <h1>SJA</h1>
        <img src="../img/plus.svg" alt="Plus" width="65px">
    </header>

    <main>
        <div class="board">
            <h2 id="donation-slogan">❤ 支持为SJA项目 ❤</h2>
            <p>SJA 是一项非盈利项目，将始终无偿免费提供功能和服务，但网站的运营实际上存在一定的支出。
                目前，SJA Plus 网站由孤言一人开发并承担全部支出。为了保障网站长期正常提供服务，
                您可以通过付费为本项目贡献力量。所有付费将 100% 用于 <strong>服务器</strong> 、<strong>域名</strong> 、<strong>网络安防</strong> 等项目支出。
            </p>
            <p>
                <strong>请注意：付费行为纯属自愿，您完全可以永久免费使用 SJA 分析器的全部功能。强烈不建议未成年人付费。</strong>
            </p>
            <h3>支付方式</h3>
            <ul id="pay-list">
                <li><img id="ali-pay-qr" src="../img/ali-pay.svg" alt="支付宝" class="pay-by-qrcode"></li>
                <li><img id="wechat-pay-qr" src="../img/wechat-pay.svg" alt="微信支付" class="pay-by-qrcode"></li>
                <li><a href="https://paypal.me/sjaplus" target="_blank"><img src="../img/paypal-pay.svg"
                            alt="PayPal"></a></li>
            </ul>
        </div>
    </main>

    <div id="pay-win">
        <span id="close-btn">关闭</span>
        <h2>支持</h2>
        <div id="pay-qrcode">
            <img src="../img/ali-pay-qr.jpg" alt="">
        </div>
    </div>

    <footer>
        <div>
            Copyright &copy;  黄力行. All rights reserved.
        </div>
        <div>
            <a href="https://beian.miit.gov.cn/" target="_blank">
                苏ICP备2023024793号-1
            </a>
        </div>
    </footer>
    <script src="../js/donation.js"></script>
</body>


</html>
